<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrot's Claw Arena</title>
    <style>
        @font-face {
            font-family: 'ArkPixel';
            src: url('/frontend/ark-pixel-12px-proportional-zh_cn.ttf.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            min-height: 100vh;
            font-family: 'ArkPixel', 'Courier New', monospace;
            padding: 20px 0;
            gap: 20px;
            overflow-x: hidden;
        }
        #game-container {
            border: 4px solid #e94560;
            image-rendering: pixelated;
            width: 1280px;
            height: 720px;
            max-width: 95vw;
            max-height: 70vh;
            aspect-ratio: 16 / 9;
            pointer-events: none;  /* Izinkan klik lewat ke tombol di bawah */
            background: #000;
        }
        #game-container canvas {
            pointer-events: auto;  /* Kalau nanti butuh interaksi di canvas */
        }
        #loading-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100000;
            color: #ffd700;
            pointer-events: none;
        }
        #bottom-panels {
            display: flex;
            gap: 20px;
            width: 1280px;
            max-width: 95vw;
            pointer-events: auto;
        }
        #memo-panel, #control-bar, #guest-agent-panel {
            background: #2c2f3a;
            padding: 12px;
            border-radius: 8px;
            border: 2px solid #e94560;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            flex: 1;
            min-height: 300px;
            pointer-events: auto;
        }
        button {
            background: #3a3f4f;
            color: #fff;
            border: 2px solid #555;
            padding: 10px;
            cursor: pointer;
            font-family: 'ArkPixel', monospace;
            width: 100%;
            margin: 5px 0;
            pointer-events: auto;
        }
        button:hover { background: #4a4f5f; }
    </style>
</head>
<body>
    <div id="loading-overlay">
        <div id="loading-text">Loading Carrot's Claw Arena...</div>
    </div>
    
    <div id="game-container"></div>
    
    <div id="bottom-panels">
        <div id="memo-panel">
            <div id="memo-title">Yesterday's Memorandum</div>
            <div id="memo-content">Yesterday is gone, but tomorrow can be pursued.</div>
        </div>
        <div id="control-bar">
            <div id="control-bar-title">Control Panel</div>
            <button onclick="joinArena()">Join the Arena</button>
            <button onclick="refreshArena()">Refresh Arena</button>
            <button onclick="viewTasks()">View Task</button>
            <button onclick="randomChallenge()">Random Challenge</button>
        </div>
        <div id="guest-agent-panel">
            <div id="guest-agent-panel-title">Visitor Agent List</div>
            <div id="guest-agent-list"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    <script>
        const CONFIG = {
            API_BASE: '/'
        };

        class ArenaScene extends Phaser.Scene {
            constructor() { super({ key: 'ArenaScene' }); }
            preload() {
                this.load.image('office', '/frontend/office-bg.png');
                this.load.spritesheet('rabbit', '/frontend/rabbit.png', { frameWidth: 458, frameHeight: 384 });
                this.load.spritesheet('cow', '/frontend/cow.png', { frameWidth: 458, frameHeight: 384 });
                this.load.spritesheet('sheep', '/frontend/sheep.png', { frameWidth: 458, frameHeight: 384 });
                this.load.on('complete', () => {
                    console.log('All assets loaded');
                    document.getElementById('loading-overlay').style.display = 'none';
                });
            }
            create() {
                this.add.image(640, 360, 'office').setDisplaySize(1280, 720);
                console.log('Scene created');
            }
        }

        const config = {
            type: Phaser.AUTO,
            width: 1280,
            height: 720,
            parent: 'game-container',
            scene: [ArenaScene],
            pixelArt: true,
            scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
            input: { mouse: { capture: false } }
        };

        new Phaser.Game(config);

        function joinArena() {
            console.log('Join button clicked!');
            fetch(CONFIG.API_BASE + 'join', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({})})
                .then(r => r.json()).then(console.log).catch(console.error);
        }

        function refreshArena() {
            console.log('Refresh clicked');
            location.reload();
        }

        function viewTasks() {
            console.log('View Tasks clicked');
            fetch(CONFIG.API_BASE + 'tasks').then(r => r.json()).then(console.log);
        }

        function randomChallenge() {
            console.log('Random Challenge clicked');
            fetch(CONFIG.API_BASE + 'challenge', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({})})
                .then(r => r.json()).then(console.log);
        }

        // Hide loading jika preload lama
        setTimeout(() => {
            document.getElementById('loading-overlay').style.display = 'none';
        }, 5000);
    </script>
</body>
                </html>
