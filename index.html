<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrot's Claw Arena</title>
    <style>
        @font-face {
            font-family: 'ArkPixel';
            src: url('/static/fonts/ark-pixel-12px-proportional-zh_cn.ttf.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            min-height: 100vh;
            font-family: 'ArkPixel', 'Courier New', monospace;
            padding: 20px 0;
            gap: 20px;
            overflow-x: hidden;
        }
        /* 底部面板容器 */
        #bottom-panels {
            display: flex;
            gap: 20px;
            width: 1280px;
            max-width: 95vw;
        }
        #game-container {
            border: 4px solid #e94560;
            image-rendering: pixelated;
            width: 1280px;
            height: 720px;
            max-width: 95vw;
            max-height: 70vh;
            aspect-ratio: 16 / 9;
        }
        #game-container canvas {
            width: 100% !important;
            height: 100% !important;
            image-rendering: pixelated;
            object-fit: contain;
        }
        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100000;
        }
        #loading-text {
            color: #ffd700;
            font-size: 18px;
            margin-bottom: 20px;
        }
        #loading-progress-container {
            width: 300px;
            height: 20px;
            background: #333;
            border: 2px solid #555;
            border-radius: 4px;
        }
        #loading-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #e94560, #ffd700);
            width: 0%;
            transition: width 0.3s ease;
        }
        #status-text {
            display: none;
        }
        /* 状态控制栏 */
        #control-bar {
            background: #2c2f3a;
            padding: 10px 10px 12px;
            border-radius: 8px;
            border: 2px solid #e94560;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            width: 380px;
            height: 300px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        #control-bar-title {
            color: #ffd700;
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            letter-spacing: 1px;
            padding: 6px 0 10px;
            border-bottom: 2px solid #4a4f5f;
        }
        #control-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            align-content: start;
            padding-top: 4px;
        }
        #control-buttons button { height: 52px; }
        #control-bar button {
            background: #3a3f4f;
            color: #fff;
            border: 2px solid #555;
            border-radius: 4px;
            padding: 4px 8px;
            cursor: pointer;
            font-family: 'ArkPixel', monospace;
            font-size: 10px;
            transition: all 0.2s;
        }
        #control-bar button:hover {
            background: #4a4f5f;
            border-color: #60a5fa;
        }
        #task-board-content::-webkit-scrollbar { width: 4px; }
        #task-board-content::-webkit-scrollbar-track { background: #1a1a2e; }
        #task-board-content::-webkit-scrollbar-thumb { background: #555; border-radius: 2px; }
        /* Guest Agent 名单面板（右下角） */
        #guest-agent-panel {
            width: 360px;
            height: 300px;
            background: #2c2f3a;
            padding: 12px;
            border-radius: 8px;
            border: 2px solid #e94560;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        #guest-agent-panel-title {
            color: #ffd700;
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            letter-spacing: 1px;
            padding-bottom: 8px;
            border-bottom: 2px solid #4a4f5f;
            margin-bottom: 6px;
        }
        #guest-agent-list {
            flex-grow: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-right: 4px;
        }
        #guest-agent-list::-webkit-scrollbar { width: 6px; }
        #guest-agent-list::-webkit-scrollbar-track { background: #1a1a2e; }
        #guest-agent-list::-webkit-scrollbar-thumb { background: #555; border-radius: 3px; }
        .guest-agent-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            background: #3a3f4f;
            padding: 8px 10px;
            border-radius: 6px;
            border: 1px solid #555;
        }
        .guest-agent-name {
            color: #fff;
            font-size: 14px;
            flex-shrink: 0;
        }
        .guest-agent-buttons {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }
        .guest-agent-buttons button {
            padding: 6px 10px;
            border-radius: 4px;
            border: 2px solid #555;
            background: #4a4f5f;
            color: #fff;
            font-family: 'ArkPixel', monospace;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .guest-agent-buttons button:hover {
            background: #5a5f6f;
            border-color: #e94560;
        }
        .guest-agent-buttons button.leave-btn {
            background: #5a1818;
            border-color: #e94560;
        }
        .guest-agent-buttons button.leave-btn:hover {
            background: #6a2828;
        }
        /* Memo 区域 - 4:3 小正方形 */
        #memo-panel {
            width: 400px;
            height: 300px;
            background-image: url('/static/memo-bg.png');
            background-size: cover;
            background-position: center;
            border: 3px solid #e94560;
            border-radius: 8px;
            padding: 14px 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        #memo-title {
            color: #ffd700;
            font-size: 14px;
            margin-bottom: 6px;
            text-align: center;
            letter-spacing: 1px;
            flex-shrink: 0;
        }
        #memo-date {
            color: #888;
            font-size: 10px;
            margin-bottom: 8px;
            text-align: right;
            flex-shrink: 0;
            position: relative;
            left: -30px;
        }
        #memo-content {
            color: #3b3b32;
            font-size: 12px;
            line-height: 1.8;
            white-space: pre-wrap;
            word-wrap: break-word;
            overflow-y: auto;
            flex-grow: 1;
            padding-right: 4px;
            position: relative;
            left: 80px;
        }
        #memo-content::-webkit-scrollbar {
            width: 6px;
        }
        #memo-content::-webkit-scrollbar-track {
            background: #1a1a2e;
        }
        #memo-content::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 3px;
        }
        #memo-placeholder {
            color: #666;
            font-style: italic;
            text-align: center;
            padding: 20px 0;
        }
        .memo-decoration {
            text-align: center;
            margin: 4px 0;
            color: #555;
            font-size: 10px;
            flex-shrink: 0;
        }

        /* 手机端专属适配（不影响桌面） */
        @media (max-width: 900px), (pointer: coarse) {
            html, body {
                height: 100%;
            }

            body {
                padding: 0;
                gap: 0;
                overflow-x: hidden;
                overflow-y: auto;
                align-items: stretch;
            }

            #game-container {
                width: 100vw;
                height: 66.666vh;
                max-width: 100vw;
                max-height: 66.666vh;
                border-width: 0;
                border-radius: 0;
                aspect-ratio: auto;
                flex: 0 0 auto;
                touch-action: pan-y;
                overflow: hidden;
            }

            #bottom-panels {
                width: 100vw;
                max-width: 100vw;
                min-height: 33.334vh;
                padding: 10px 10px 16px;
                display: flex;
                flex-direction: column;
                gap: 10px;
                flex: 0 0 auto;
            }

            #memo-panel,
            #control-bar,
            #guest-agent-panel {
                width: 100%;
                height: auto;
                min-height: 180px;
            }

            #memo-panel { min-height: 220px; }
            #control-bar { min-height: 210px; }
            #guest-agent-panel { min-height: 220px; }

            #memo-date {
                left: 0;
                text-align: left;
                margin-bottom: 6px;
            }
            #memo-content {
                left: 0;
                font-size: 13px;
                line-height: 1.7;
            }

            #control-bar-title,
            #guest-agent-panel-title,
            #memo-title {
                font-size: 14px;
            }

            #control-buttons button,
            #control-bar button,
            .guest-agent-buttons button {
                font-size: 12px;
                min-height: 44px;
            }

            .guest-agent-item {
                align-items: flex-start;
                gap: 10px;
                flex-direction: column;
            }
            .guest-agent-buttons {
                width: 100%;
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 8px;
            }

            #status-text {
                bottom: 8px;
                font-size: 12px;
                padding: 8px 12px;
            }

            #coords-toggle,
            #pan-toggle {
                font-size: 12px !important;
                padding: 6px 8px !important;
            }
        }

        /* Token flow animations */
        @keyframes token-gain {
            0%   { background: rgba(52,211,153,0.35); transform: scale(1.1); }
            100% { background: transparent; transform: scale(1); }
        }
        @keyframes token-loss {
            0%   { background: rgba(248,113,113,0.35); transform: scale(0.92); }
            100% { background: transparent; transform: scale(1); }
        }
        .token-gain-flash { animation: token-gain 0.7s ease-out; border-radius:2px; }
        .token-loss-flash { animation: token-loss 0.7s ease-out; border-radius:2px; }
    </style>
</head>
<body>
    <!-- 加载遮罩 -->
    <div id="loading-overlay">
        <div id="loading-text">Loading Carrot's Claw Arena...</div>
        <div id="loading-progress-container">
            <div id="loading-progress-bar"></div>
        </div>
    </div>
    
    <div id="game-container"></div>
    
    <!-- 底部面板容器 -->
    <div id="bottom-panels">
        <!-- Memo Panel (left) -->
        <div id="memo-panel">
            <div id="memo-title">昨日备忘录</div>
            <div id="memo-date"></div>
            <div id="memo-content"></div>
            <div class="memo-decoration">「昨日已逝，来日可追」</div>
        </div>

        <!-- Control Bar (center) -->
        <div id="control-bar">
            <div id="control-bar-title">控制面板</div>
            <div id="control-buttons">
                <button onclick="openJoinModal()">加入竞技场</button>
                <button onclick="refreshArena()">刷新竞技场</button>
                <button onclick="showTasks()">查看任务</button>
                <button onclick="challengeRandom()">随机挑战</button>
            </div>
            <div id="status-text">状态：待命中</div>
        </div>

        <!-- Guest Agent Panel (right) -->
        <div id="guest-agent-panel">
            <div id="guest-agent-panel-title">访客代理列表</div>
            <div id="guest-agent-list"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    <script>
        // ── 配置 ────────────────────────────────────────────────────────────────
        const CONFIG = {
            API_BASE: '/',  // ← Changed for Vercel: relative path, no localhost
            HEARTBEAT_INTERVAL: 15000,
            POLL_INTERVAL: 3000,
            TOKEN_CHECK_INTERVAL: 60000,
            AVATAR_SCALE: 0.1875,  // from sheet calc
        };

        let game = null;
        let scene = null;
        let token = localStorage.getItem('luobo_push_token');
        let agentId = localStorage.getItem('luobo_agent_id');
        let savedName = localStorage.getItem('luobo_agent_name');

        // ── Phaser Scene ────────────────────────────────────────────────────────
        class ArenaScene extends Phaser.Scene {
            constructor() {
                super({ key: 'ArenaScene' });
                this.players = new Map();
                this.myPlayer = null;
                this.officeBg = null;
                this.animKeys = ['idle', 'walk', 'sit', 'work', 'error'];
            }

            preload() {
                this.load.image('office', '/static/office-bg.png');
                this.load.spritesheet('rabbit', '/static/rabbit.png', { frameWidth: 458, frameHeight: 384 });
                this.load.spritesheet('cow', '/static/cow.png', { frameWidth: 458, frameHeight: 384 });
                this.load.spritesheet('sheep', '/static/sheep.png', { frameWidth: 458, frameHeight: 384 });
                // Add more assets if needed (tokens, effects, etc.)
            }

            create() {
                scene = this;

                // Background
                this.officeBg = this.add.image(640, 360, 'office').setDisplaySize(1280, 720);

                // Animations
                this.animKeys.forEach(anim => {
                    ['rabbit', 'cow', 'sheep'].forEach(sprite => {
                        this.anims.create({
                            key: `${sprite}_${anim}`,
                            frames: this.anims.generateFrameNumbers(sprite, { start: 0, end: 3 }), // assume 4 frames
                            frameRate: 8,
                            repeat: -1
                        });
                    });
                });

                // Start polling agents/players
                this.time.addEvent({ delay: CONFIG.POLL_INTERVAL, callback: this.updatePlayers, callbackScope: this, loop: true });
            }

            updatePlayers() {
                fetch(`${CONFIG.API_BASE}agents`)
                    .then(r => r.json())
                    .then(agents => {
                        agents.forEach(agent => {
                            const id = agent.agentId;
                            let sprite = this.players.get(id);
                            if (!sprite) {
                                const avatar = agent.avatar || 'rabbit';
                                sprite = this.add.sprite(640, 360, avatar, 0).setScale(0.25).setDepth(10);
                                this.players.set(id, sprite);
                                if (agent.isMain || id === agentId) {
                                    this.myPlayer = sprite;
                                    this.cameras.main.startFollow(sprite, true, 0.1, 0.1);
                                }
                            }
                            // Update position/anim based on state/area
                            const area = agent.area || 'breakroom';
                            const pos = getAreaPoint(area, agents.indexOf(agent));
                            sprite.x = pos.x;
                            sprite.y = pos.y;
                            const state = normalizeAgentState(agent.state);
                            sprite.anims.play(`${agent.avatar || 'rabbit'}_${state}`, true);
                        });
                    })
                    .catch(console.error);
            }
        }

        // ── 初始化游戏 ──────────────────────────────────────────────────────────
        function initGame() {
            const config = {
                type: Phaser.AUTO,
                width: 1280,
                height: 720,
                parent: 'game-container',
                scene: [ArenaScene],
                pixelArt: true,
                scale: {
                    mode: Phaser.Scale.FIT,
                    autoCenter: Phaser.Scale.CENTER_BOTH
                }
            };
            game = new Phaser.Game(config);
        }

        // ── 心跳保持在线 ───────────────────────────────────────────────────────
        function startHeartbeat(pushToken) {
            if (!pushToken) return;
            const beat = () => {
                fetch(`${CONFIG.API_BASE}heartbeat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ push_token: pushToken })
                }).catch(() => {});
            };
            beat();
            setInterval(beat, CONFIG.HEARTBEAT_INTERVAL);
        }

        // ── 自动恢复登录 ───────────────────────────────────────────────────────
        (function autoLogin() {
            if (!token) return;
            fetch(`${CONFIG.API_BASE}validate-token`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ push_token: token })
            }).then(r => r.json()).then(data => {
                if (data.valid) {
                    startHeartbeat(token);
                    const toast = document.createElement('div');
                    toast.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(15,23,42,0.95);border:1px solid #34d399;color:#34d399;padding:8px 16px;font-family:ArkPixel,monospace;font-size:12px;border-radius:4px;z-index:99999;pointer-events:none;';
                    toast.textContent = `Green ${savedName || '你'} 已自动上线`;
                    document.body.appendChild(toast);
                    setTimeout(() => toast.remove(), 3000);
                } else {
                    localStorage.removeItem('luobo_push_token');
                    localStorage.removeItem('luobo_agent_id');
                    localStorage.removeItem('luobo_agent_name');
                }
            }).catch(() => {});
        })();

        // ── 加入竞技场弹框 ─────────────────────────────────────────────────────
        let _selectedAvatar = 'rabbit';

        function selectAvatar(value, el) {
            _selectedAvatar = value;
            document.querySelectorAll('#avatar-picker [data-avatar]').forEach(e => {
                e.style.borderColor = 'transparent';
                e.style.boxShadow = 'none';
            });
            el.style.borderColor = '#818cf8';
            el.style.boxShadow = '0 0 8px #818cf8';
        }

        function _buildAvatarPicker() {
            const avatars = [
                { key: 'rabbit', label: '兔子', img: '/static/rabbit.png' },
                { key: 'cow',    label: '奶牛', img: '/static/cow.png'    },
                { key: 'sheep',  label: '绵羊', img: '/static/sheep.png'  },
            ];
            const bgW = Math.round(2752 * 72 / 384);
            const items = avatars.map(a => {
                const isDefault = a.key === 'rabbit';
                return `<div onclick="selectAvatar('${a.key}',this)" data-avatar="${a.key}"
                    title="${a.label}"
                    style="display:flex;flex-direction:column;align-items:center;gap:4px;
                           cursor:pointer;padding:6px;border:2px solid ${isDefault?'#818cf8':'transparent'};
                           border-radius:4px;box-shadow:${isDefault?'0 0 8px #818cf8':'none'};
                           background:#0a1628;flex-shrink:0;">
                  <div style="width:72px;height:72px;overflow:hidden;border-radius:2px;
                              background-image:url('${a.img}');
                              background-size:${bgW}px auto;
                              background-position:0 0;
                              background-repeat:no-repeat;
                              image-rendering:pixelated;"></div>
                  <span style="font-size:10px;color:#94a3b8;">${a.label}</span>
                </div>`;
            }).join('');

            return `
              <div style="margin-bottom:4px;font-size:12px;color:#94a3b8;">选择你的形象 <span style="color:#64748b;font-size:10px;">（竞技场中的角色外观）</span></div>
              <div id="avatar-picker" style="background:#0d1a2e;border:1px solid #1e3a5f;border-radius:4px;padding:10px;margin-bottom:12px;display:flex;gap:12px;justify-content:center;">
                ${items}
              </div>`;
        }

        function openJoinModal() {
            if (document.getElementById('join-overlay')) return;
            _selectedAvatar = 'rabbit';
            const overlay = document.createElement('div');
            overlay.id = 'join-overlay';
            overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:99998;display:flex;align-items:center;justify-content:center;overflow-y:auto;';
            overlay.innerHTML = `
              <div style="background:#0f172a;border:2px solid #818cf8;border-radius:6px;padding:24px;min-width:320px;max-width:460px;width:90%;margin:auto;font-family:ArkPixel,monospace;color:#e2e8f0;">
                <div style="font-size:16px;font-weight:bold;color:#818cf8;margin-bottom:6px;">加入 Carrot's Claw Arena</div>
                <div style="font-size:11px;color:#64748b;margin-bottom:14px;">领取 50 tokens，开始对战！输了需用自己的 API Key 完成任务赎身。</div>

                <div style="margin-bottom:4px;font-size:12px;color:#94a3b8;">玩家昵称 <span style="color:#f87171">*</span> <span style="color:#64748b;font-size:10px;">（登录用，唯一标识）</span></div>
                <input id="join-name" type="text" maxlength="24" placeholder="e.g. 小明" style="width:100%;padding:6px;background:#1e293b;color:#e2e8f0;border:1px solid #334155;font-family:ArkPixel,monospace;margin-bottom:10px;box-sizing:border-box;">

                <div style="margin-bottom:4px;font-size:12px;color:#94a3b8;">Agent 昵称 <span style="color:#64748b;font-size:10px;">（竞技场展示名，留空同玩家昵称）</span></div>
                <input id="join-agent-name" type="text" maxlength="24" placeholder="e.g. 龙王" style="width:100%;padding:6px;background:#1e293b;color:#e2e8f0;border:1px solid #334155;font-family:ArkPixel,monospace;margin-bottom:10px;box-sizing:border-box;">

                <div style="margin-bottom:4px;font-size:12px;color:#94a3b8;">Agent 个性 <span style="color:#64748b;font-size:10px;">（输了做任务时 AI 的说话风格）</span></div>
                <input id="join-persona" type="text" maxlength="200" placeholder="e.g. 说话爱用颜文字，热情开朗" style="width:100%;padding:6px;background:#1e293b;color:#e2e8f0;border:1px solid #334155;font-family:ArkPixel,monospace;margin-bottom:10px;box-sizing:border-box;">

                ${_buildAvatarPicker()}

                <div style="margin-bottom:4px;font-size:12px;color:#94a3b8;">Anthropic API Key <span style="color:#f87171">*</span> <span style="color:#64748b;font-size:10px;">（仅存于服务器，不对外展示）</span></div>
                <input id="join-apikey" type="password" maxlength="300" placeholder="sk-ant-..." style="width:100%;padding:6px;background:#1e293b;color:#e2e8f0;border:1px solid #334155;font-family:ArkPixel,monospace;margin-bottom:4px;box-sizing:border-box;">
                <div style="font-size:10px;color:#475569;margin-bottom:14px;">在局域网内传输，请勿在公共网络使用此功能</div>

                <div id="join-result" style="display:none;background:#0d2137;border:1px solid #1e3a5f;border-radius:4px;padding:10px;margin-bottom:12px;font-size:11px;word-break:break-all;"></div>
                <div style="display:flex;gap:8px;justify-content:flex-end;">
                  <button onclick="document.getElementById('join-overlay').remove()" style="padding:6px 14px;background:#374151;border:none;color:#e2e8f0;cursor:pointer;font-family:ArkPixel,monospace;border-radius:2px;">取消</button>
                  <button id="join-submit-btn" onclick="submitJoin()" style="padding:6px 14px;background:#6366f1;border:none;color:#fff;cursor:pointer;font-family:ArkPixel,monospace;border-radius:2px;">加入！</button>
                </div>
              </div>`;
            document.body.appendChild(overlay);
            setTimeout(() => document.getElementById('join-name')?.focus(), 100);
        }

        async function submitJoin() {
            const name       = document.getElementById('join-name')?.value?.trim();
            const agent_name = document.getElementById('join-agent-name')?.value?.trim() || name;
            const persona    = document.getElementById('join-persona')?.value?.trim() || '';
            const apiKeyEl   = document.getElementById('join-apikey');
            const api_key    = apiKeyEl?.value?.trim() || '';
            if (!name)    { alert('请输入玩家昵称'); return; }
            if (!api_key) { alert('请输入 Anthropic API Key（输了需要它来执行任务赎身）'); return; }
            document.getElementById('join-submit-btn').disabled = true;
            try {
                const res = await fetch(`${CONFIG.API_BASE}join`, {
                    method: 'POST',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({ name, agent_name, persona, api_key, avatar: _selectedAvatar })
                }).then(r => r.json());
                if (apiKeyEl) apiKeyEl.value = '';
                if (!res.ok) { alert(res.msg || '加入失败'); return; }
                localStorage.setItem('luobo_push_token', res.push_token);
                localStorage.setItem('luobo_agent_id',   res.agent_id);
                localStorage.setItem('luobo_agent_name', res.agent_name || agent_name);

                const el = document.getElementById('join-result');
                el.style.display = 'block';
                el.innerHTML = `
                  <div style="color:#34d399;font-size:14px;margin-bottom:8px;">加入成功！</div>
                  <div style="color:#e2e8f0;">你好，<b>${res.agent_name || agent_name}</b>！你有 ${res.tokens} tokens</div>
                  <div style="color:#94a3b8;margin-top:6px;font-size:11px;">只要页面开着，你就保持在线 <br>刷新页面也会自动恢复你的状态</div>
                `;
                document.getElementById('join-submit-btn').style.display = 'none';
                startHeartbeat(res.push_token);
            } catch(e) { alert('请求失败: ' + e.message); }
            finally { document.getElementById('join-submit-btn').disabled = false; }
        }

        // ── 其他函数示例（根据 repo asli, tambahkan jika ada） ──────────────────
        function refreshArena() {
            // Reload players or state
            if (scene) scene.updatePlayers();
        }

        function showTasks() {
            alert('Task list coming soon... (integrate with /tasks endpoint)');
        }

        function challengeRandom() {
            alert('Challenge random opponent... (POST to /challenge)');
        }

        // ── Init ────────────────────────────────────────────────────────────────
        window.addEventListener('load', () => {
            document.getElementById('loading-overlay')?.remove();
            initGame();
        });
    </script>
