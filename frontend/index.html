<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star 的像素办公室</title>
    <style>
        @font-face {
            font-family: 'ArkPixel';
            src: url('/static/fonts/ark-pixel-12px-proportional-zh_cn.ttf.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            min-height: 100vh;
            font-family: 'ArkPixel', 'Courier New', monospace;
            padding: 20px 0;
            gap: 20px;
            overflow-x: hidden;
        }
        /* 底部面板容器 */
        #bottom-panels {
            display: flex;
            gap: 20px;
            width: 1280px;
            max-width: 95vw;
        }
        #game-container {
            border: 4px solid #e94560;
            image-rendering: pixelated;
            width: 1280px;
            height: 720px;
            max-width: 95vw;
            /* 手机上用“可见高度”限制，避免被底部面板挤压导致裁切 */
            max-height: 70vh;
            /* 关键：强制容器保持 16:9，避免 canvas 在不同布局下被拉伸变形 */
            aspect-ratio: 16 / 9;
        }
        #game-container canvas {
            width: 100% !important;
            height: 100% !important;
            image-rendering: pixelated;
            /* 再兜底一次：即使外层高度变化，也不要拉伸变形 */
            object-fit: contain;
        }
        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100000;
        }
        #loading-text {
            color: #ffd700;
            font-size: 18px;
            margin-bottom: 20px;
        }
        #loading-progress-container {
            width: 300px;
            height: 20px;
            background: #333;
            border: 2px solid #555;
            border-radius: 4px;
        }
        #loading-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #e94560, #ffd700);
            width: 0%;
            transition: width 0.3s ease;
        }
        #status-text {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #eee;
            font-size: 14px;
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 4px;
            max-width: 90%;
            text-align: center;
            font-family: 'ArkPixel', 'Courier New', monospace;
        }
        /* 状态控制栏 */
        #control-bar {
            background: #2c2f3a;
            padding: 10px 10px 12px;
            border-radius: 8px;
            border: 2px solid #e94560;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            width: 380px;
            height: 300px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        #control-bar-title {
            color: #ffd700;
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            letter-spacing: 1px;
            padding: 6px 0 10px;
            border-bottom: 2px solid #4a4f5f;
        }
        #control-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            align-content: start;
            padding-top: 4px;
        }
        #control-buttons button { height: 52px; }
        #control-bar button {
            background: #3a3f4f;
            color: #fff;
            border: 2px solid #555;
            border-radius: 4px;
            padding: 8px 10px;
            cursor: pointer;
            font-family: 'ArkPixel', monospace;
            font-size: 12px;
            transition: all 0.2s;
        }
        #control-bar button:hover {
            background: #4a4f5f;
            border-color: #e94560;
        }
        /* Guest Agent 名单面板（右下角） */
        #guest-agent-panel {
            width: 360px;
            height: 300px;
            background: #2c2f3a;
            padding: 12px;
            border-radius: 8px;
            border: 2px solid #e94560;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        #guest-agent-panel-title {
            color: #ffd700;
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            letter-spacing: 1px;
            padding-bottom: 8px;
            border-bottom: 2px solid #4a4f5f;
            margin-bottom: 6px;
        }
        #guest-agent-list {
            flex-grow: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-right: 4px;
        }
        #guest-agent-list::-webkit-scrollbar { width: 6px; }
        #guest-agent-list::-webkit-scrollbar-track { background: #1a1a2e; }
        #guest-agent-list::-webkit-scrollbar-thumb { background: #555; border-radius: 3px; }
        .guest-agent-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            background: #3a3f4f;
            padding: 8px 10px;
            border-radius: 6px;
            border: 1px solid #555;
        }
        .guest-agent-name {
            color: #fff;
            font-size: 14px;
            flex-shrink: 0;
        }
        .guest-agent-buttons {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }
        .guest-agent-buttons button {
            padding: 6px 10px;
            border-radius: 4px;
            border: 2px solid #555;
            background: #4a4f5f;
            color: #fff;
            font-family: 'ArkPixel', monospace;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .guest-agent-buttons button:hover {
            background: #5a5f6f;
            border-color: #e94560;
        }
        .guest-agent-buttons button.leave-btn {
            background: #5a1818;
            border-color: #e94560;
        }
        .guest-agent-buttons button.leave-btn:hover {
            background: #6a2828;
        }
        /* Memo 区域 - 4:3 小正方形 */
        #memo-panel {
            width: 400px;
            height: 300px;
            background-image: url('/static/memo-bg.png');
            background-size: cover;
            background-position: center;
            border: 3px solid #e94560;
            border-radius: 8px;
            padding: 14px 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        #memo-title {
            color: #ffd700;
            font-size: 14px;
            margin-bottom: 6px;
            text-align: center;
            letter-spacing: 1px;
            flex-shrink: 0;
        }
        #memo-date {
            color: #888;
            font-size: 10px;
            margin-bottom: 8px;
            text-align: right;
            flex-shrink: 0;
            position: relative;
            left: -30px; /* move date left by 30px */
        }
        #memo-content {
            color: #3b3b32;
            font-size: 12px;
            line-height: 1.8;
            white-space: pre-wrap;
            word-wrap: break-word;
            overflow-y: auto;
            flex-grow: 1;
            padding-right: 4px;
            position: relative;
            left: 80px; /* move content right by 80px */
        }
        #memo-content::-webkit-scrollbar {
            width: 6px;
        }
        #memo-content::-webkit-scrollbar-track {
            background: #1a1a2e;
        }
        #memo-content::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 3px;
        }
        #memo-placeholder {
            color: #666;
            font-style: italic;
            text-align: center;
            padding: 20px 0;
        }
        .memo-decoration {
            text-align: center;
            margin: 4px 0;
            color: #555;
            font-size: 10px;
            flex-shrink: 0;
        }

        /* 手机端专属适配（不影响桌面） */
        @media (max-width: 900px), (pointer: coarse) {
            html, body {
                height: 100%;
            }

            body {
                padding: 0;
                gap: 0;
                overflow-x: hidden;
                overflow-y: auto;
                align-items: stretch;
            }

            #game-container {
                width: 100vw;
                height: 66.666vh; /* 办公室占 2/3 屏幕高度 */
                max-width: 100vw;
                max-height: 66.666vh;
                border-width: 0;
                border-radius: 0;
                aspect-ratio: auto;
                flex: 0 0 auto;
                touch-action: pan-y; /* 保留页面纵向滚动手势 */
                overflow: hidden;
            }

            #bottom-panels {
                width: 100vw;
                max-width: 100vw;
                min-height: 33.334vh; /* 余下约 1/3 可见区 */
                padding: 10px 10px 16px;
                display: flex;
                flex-direction: column;
                gap: 10px;
                flex: 0 0 auto;
            }

            #memo-panel,
            #control-bar,
            #guest-agent-panel {
                width: 100%;
                height: auto;
                min-height: 180px;
            }

            #memo-panel { min-height: 220px; }
            #control-bar { min-height: 210px; }
            #guest-agent-panel { min-height: 220px; }

            #memo-date {
                left: 0;
                text-align: left;
                margin-bottom: 6px;
            }
            #memo-content {
                left: 0;
                font-size: 13px;
                line-height: 1.7;
            }

            #control-bar-title,
            #guest-agent-panel-title,
            #memo-title {
                font-size: 14px;
            }

            #control-buttons button,
            #control-bar button,
            .guest-agent-buttons button {
                font-size: 12px;
                min-height: 44px;
            }

            .guest-agent-item {
                align-items: flex-start;
                gap: 10px;
                flex-direction: column;
            }
            .guest-agent-buttons {
                width: 100%;
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 8px;
            }

            #status-text {
                bottom: 8px;
                font-size: 12px;
                padding: 8px 12px;
            }

            #coords-toggle,
            #pan-toggle {
                font-size: 12px !important;
                padding: 6px 8px !important;
            }
        }

        /* Token flow animations */
        @keyframes token-gain {
            0%   { background: rgba(52,211,153,0.35); transform: scale(1.1); }
            100% { background: transparent; transform: scale(1); }
        }
        @keyframes token-loss {
            0%   { background: rgba(248,113,113,0.35); transform: scale(0.92); }
            100% { background: transparent; transform: scale(1); }
        }
        .token-gain-flash { animation: token-gain 0.7s ease-out; border-radius:2px; }
        .token-loss-flash { animation: token-loss 0.7s ease-out; border-radius:2px; }
    </style>
</head>
<body>
    <!-- 加载遮罩 -->
    <div id="loading-overlay">
        <div id="loading-text">正在加载 Star 的像素办公室...</div>
        <div id="loading-progress-container">
            <div id="loading-progress-bar"></div>
        </div>
    </div>
    
    <div id="game-container"></div>
    
    <!-- 底部面板容器 -->
    <div id="bottom-panels">
        <!-- Memo 面板 -->
        <div id="memo-panel">
            <div id="memo-title" style="letter-spacing:4px;">— 账 本 —</div>
            <div class="memo-decoration">─ ─ ─ ─ ─</div>
            <div id="ledger-content" style="overflow-y:auto;max-height:180px;font-family:ArkPixel,monospace;font-size:11px;padding:4px 2px;">
                <div style="color:#9ca3af;text-align:center;padding:12px 0;">加载中...</div>
            </div>
            <div class="memo-decoration">─ ─ ─ ─ ─</div>
        </div>
        
        <!-- 状态控制栏 -->
        <div id="control-bar">
            <div id="control-bar-title">Agent 状态</div>
            <div id="control-buttons">
                <button onclick="setState('idle','待命')">待命</button>
                <button onclick="setState('writing','工作中')">工作</button>
                <button onclick="setState('syncing','同步中')">同步</button>
                <button onclick="setState('error','报警中')">报警</button>
            </div>
        </div>

        <!-- Guest Agent 名单面板（右下角） -->
        <div id="guest-agent-panel">
            <div id="guest-agent-panel-title" style="display:flex;align-items:center;justify-content:space-between;padding:0 4px;">
                <span>— 挑 战 者 列 表 —</span>
                <button onclick="openJoinModal()" style="font-family:ArkPixel,monospace;font-size:10px;padding:2px 8px;background:#6366f1;border:none;color:#fff;cursor:pointer;border-radius:2px;">👤 加入</button>
            </div>
            <div id="guest-agent-list">
                <div style="color:#9ca3af;font-size:12px;text-align:center;padding:20px 0;">加载中...</div>
            </div>
        </div>
    </div>
    
    <div id="status-text">加载中...</div>
    <div id="coords-overlay" style="display:none; position:fixed; pointer-events:none; background:rgba(0,0,0,0.85); color:#fff; font-family:ArkPixel,monospace; font-size:14px; padding:8px 12px; border-radius:4px; z-index:99999;">
        <div id="coords-display">X: 0 | Y: 0</div>
    </div>
    <button id="coords-toggle" style="position:fixed; top:calc(env(safe-area-inset-top, 0px) + 12px); right:12px; z-index:999999; padding:8px 10px; font-family:ArkPixel,monospace; font-size:13px; cursor:pointer; border:2px solid #333; border-radius:5px; background:#333; color:#fff;">
        显示坐标
    </button>
    <button id="pan-toggle" style="position:fixed; top:calc(env(safe-area-inset-top, 0px) + 12px); left:12px; z-index:999999; padding:8px 10px; font-family:ArkPixel,monospace; font-size:13px; cursor:pointer; border:2px solid #333; border-radius:5px; background:#333; color:#fff;">
        移动视野
    </button>

    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    <script>
        // 检测浏览器是否支持 WebP
        let supportsWebP = false;
        
        // 方法 1: 使用 canvas 检测
        function checkWebPSupport() {
            return new Promise((resolve) => {
                const canvas = document.createElement('canvas');
                if (canvas.getContext && canvas.getContext('2d')) {
                    resolve(canvas.toDataURL('image/webp').indexOf('data:image/webp') === 0);
                } else {
                    resolve(false);
                }
            });
        }
        
        // 方法 2: 使用 image 检测（备用）
        function checkWebPSupportFallback() {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => resolve(true);
                img.onerror = () => resolve(false);
                img.src = 'data:image/webp;base64,UklGRkoAAABXRUJQVlA4WAoAAAAQAAAAAAAAAAAAQUxQSAwAAAABBxAR/Q9ERP8DAABWUDggGAAAADABAJ0BKgEAAQADADQlpAADcAD++/1QAA==';
            });
        }
        
        // 获取文件扩展名（根据 WebP 支持情况）
        function getExt(pngFile) {
            // star-working-spritesheet.png 太宽了，WebP 不支持，始终用 PNG
            if (pngFile === 'star-working-spritesheet.png') {
                return '.png';
            }
            return supportsWebP ? '.webp' : '.png';
        }

        const IS_TOUCH_DEVICE = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0) || window.matchMedia('(pointer: coarse)').matches;

        const config = {
            type: Phaser.AUTO,
            width: 1280,
            height: 720,
            parent: 'game-container',
            pixelArt: true,
            // 桌面端保持 FIT；手机端改 RESIZE，让办公室区域真正吃满分配到的高度。
            scale: {
                mode: IS_TOUCH_DEVICE ? Phaser.Scale.RESIZE : Phaser.Scale.FIT,
                autoCenter: Phaser.Scale.CENTER_BOTH,
                width: 1280,
                height: 720
            },
            physics: { default: 'arcade', arcade: { gravity: { y: 0 }, debug: false } },
            scene: { preload: preload, create: create, update: update }
        };

        let totalAssets = 0;
        let loadedAssets = 0;
        let loadingProgressBar, loadingProgressContainer, loadingOverlay, loadingText;

        // Memo 相关函数
        async function loadLedger() {
            const el = document.getElementById('ledger-content');
            if (!el) return;
            try {
                const data = await fetch('/ledger?limit=30&t=' + Date.now(), { cache: 'no-store' }).then(r => r.json());
                if (!Array.isArray(data) || data.length === 0) {
                    el.innerHTML = '<div style="color:#9ca3af;text-align:center;padding:12px 0;">暂无记录</div>';
                    return;
                }
                const typeLabel = {
                    init: '🌱初始化', bet_lock: '🔒锁仓', bet_return: '↩️退还',
                    battle_win: '⚔️战胜', task_reward: '📋任务', walk_away: '🕊️释放',
                    admin_adjust: '🔧调整'
                };
                const typeColor = {
                    battle_win: '#fbbf24', task_reward: '#34d399', walk_away: '#60a5fa',
                    admin_adjust: '#f87171', init: '#a78bfa', bet_return: '#94a3b8'
                };
                el.innerHTML = data.map(e => {
                    const label = typeLabel[e.type] || e.type;
                    const color = typeColor[e.type] || '#cbd5e1';
                    const delta = e.delta > 0 ? `+${e.delta}` : e.delta < 0 ? `${e.delta}` : '';
                    const deltaColor = e.delta > 0 ? '#34d399' : e.delta < 0 ? '#f87171' : '#94a3b8';
                    const from = (e.from || '').replace('system','SYS');
                    const to = (e.to || '');
                    const ts = new Date(e.created_at * 1000).toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit'});
                    return `<div style="display:flex;align-items:center;gap:4px;padding:3px 4px;border-bottom:1px solid #1e293b;">
                        <span style="color:${color};min-width:72px;font-size:10px;">${label}</span>
                        <span style="color:#94a3b8;font-size:10px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${from}→${to}</span>
                        <span style="color:${deltaColor};font-size:10px;min-width:28px;text-align:right;">${delta}</span>
                        <span style="color:#475569;font-size:9px;min-width:36px;text-align:right;">${ts}</span>
                    </div>`;
                }).join('');
            } catch(e) {
                el.innerHTML = '<div style="color:#9ca3af;text-align:center;padding:12px 0;">加载失败</div>';
            }
        }
        // 兼容旧调用
        async function loadMemo() { return loadLedger(); }

        // 更新加载进度
        function updateLoadingProgress() {
            loadedAssets++;
            const percent = Math.min(100, Math.round((loadedAssets / totalAssets) * 100));
            if (loadingProgressBar) {
                loadingProgressBar.style.width = percent + '%';
            }
            if (loadingText) {
                loadingText.textContent = `正在加载 Star 的像素办公室... ${percent}%`;
            }
        }

        // 隐藏加载界面
        function hideLoadingOverlay() {
            setTimeout(() => {
                if (loadingOverlay) {
                    loadingOverlay.style.transition = 'opacity 0.5s ease';
                    loadingOverlay.style.opacity = '0';
                    setTimeout(() => {
                        loadingOverlay.style.display = 'none';
                    }, 500);
                }
            }, 300);
        }

        // 兜底：某些移动网络/CDN 抖动时，避免一直卡在“加载中”遮罩
        setTimeout(() => {
            if (loadingOverlay && loadingOverlay.style.display !== 'none') {
                hideLoadingOverlay();
            }
        }, 8000);
        
        // 懒加载逻辑已取消（体验优先：装饰首屏直接出现）

        const STATES = {
            idle: { name: '待命', area: 'breakroom' },
            writing: { name: '整理文档', area: 'writing' },
            researching: { name: '搜索信息', area: 'researching' },
            executing: { name: '执行任务', area: 'writing' },
            syncing: { name: '同步备份', area: 'writing' },
            error: { name: '出错了', area: 'error' }
        };

        const BUBBLE_TEXTS = {

                '小猫说：慢一点也没关系'
            ],
            // writing / researching / executing 都视为“工作”
            writing: [
                '进入专注模式：勿扰',
                '先把关键路径跑通',
                '我来把复杂变简单',
                '把 bug 关进笼子里',
                '写到一半，先保存',
                '把每一步都做成可回滚',
                '今天的进度，明天的底气',
                '先收敛，再发散',

                '稳住，我们能赢'
            ],
            researching: [
                '我在挖证据链',
                '让我把信息熬成结论',
                '找到了：关键在这里',
                '先把变量控制住',
                '我在查：它为什么会这样',
                '把直觉写成验证',
                '先定位，再优化',
                '别急，先画因果图'
            ],
            executing: [
                '执行中：不要眨眼',
                '把任务切成小块逐个击破',
                '开始跑 pipeline',
                '一键推进：走你',
                '让结果自己说话',
                '先做最小可行，再做最美版本'
            ],
            syncing: [
                '同步中：把今天锁进云里',
                '备份不是仪式，是安全感',
                '写入中…别断电',
                '把变更交给时间戳',
                '云端对齐：咔哒',
                '同步完成前先别乱动',
                '把未来的自己从灾难里救出来',
                '多一份备份，少一份后悔'
            ],
            error: [

        function renderChallengePanel() {
            const list = document.getElementById('guest-agent-list');

            if (challengeEconomy.length === 0) {
                list.innerHTML = '<div style="color:#9ca3af;font-size:12px;text-align:center;padding:20px 0;">无经济 Agent</div>';
                return;
            }
            const statusIcon = { idle:'🟢', in_battle:'⚔️', enslaved:'⛓️' };
            const sorted = [...challengeEconomy].sort((a,b) => (b.tokens||0)-(a.tokens||0));
            list.innerHTML = sorted.map((agent, i) => {
                const icon = statusIcon[agent.status] || '⚪';
                const contractInfo = agent.contract
                    ? `<span style="color:#f59e0b;font-size:9px;"> ⛓️ master:${agent.contract.master_id} tasks:${agent.contract.tasks_remaining}</span>`
                    : '';
                const canChallenge = agent.status === 'idle';
                const btn = canChallenge
                    ? `<button onclick="openChallenge('${agent.id}','${agent.name}')" style="padding:2px 8px;font-family:ArkPixel,monospace;font-size:10px;background:#dc2626;border:none;color:#fff;cursor:pointer;border-radius:2px;">⚔️ 挑战</button>`
                    : `<button disabled style="padding:2px 8px;font-family:ArkPixel,monospace;font-size:10px;background:#374151;border:none;color:#6b7280;border-radius:2px;">${icon} 忙碌</button>`;
                const rankColor = i===0?'#fbbf24':i===1?'#94a3b8':i===2?'#b45309':'#475569';
                const isReal = agent.agent_type === 'real';
                const onlineDot = isReal
                    ? (agent.online ? '<span title="在线" style="color:#34d399;font-size:9px;">●</span>' : '<span title="离线" style="color:#6b7280;font-size:9px;">●</span>')
                    : '';
                const typeBadge = isReal
                    ? `<span title="真实玩家" style="color:#818cf8;font-size:9px;background:rgba(99,102,241,0.15);border-radius:2px;padding:0 3px;">👤</span>`
                    : `<span title="AI Agent" style="color:#64748b;font-size:9px;">🤖</span>`;
                return `<div data-econid="${agent.id}" style="display:flex;align-items:center;gap:4px;padding:4px 6px;border-bottom:1px solid #1e293b;">
                    <span style="color:${rankColor};font-size:10px;min-width:14px;">#${i+1}</span>
                    ${onlineDot}
                    ${typeBadge}
                    <span style="color:#e2e8f0;font-size:11px;font-family:ArkPixel,monospace;flex:1;">${agent.name}</span>
                    <span style="color:#fbbf24;font-size:11px;min-width:44px;">💰${agent.tokens??'?'}</span>
                    ${contractInfo}
                    ${btn}
                </div>`;
            }).join('');

            // Flash rows where tokens changed
            requestAnimationFrame(() => {
                for (const agent of sorted) {
                    const prev = _prevTokens[agent.id];
                    if (prev !== undefined && prev !== agent.tokens) {
                        const row = list.querySelector(`[data-econid="${agent.id}"]`);
                        if (row) {
                            const cls = agent.tokens > prev ? 'token-gain-flash' : 'token-loss-flash';
                            row.classList.remove('token-gain-flash','token-loss-flash');
                            void row.offsetWidth; // reflow to restart animation
                            row.classList.add(cls);
                            setTimeout(() => row.classList.remove(cls), 800);

                            // Floating delta number
                            const delta = agent.tokens - prev;
                            const rect = row.getBoundingClientRect();
                            const floater = document.createElement('div');
                            floater.style.cssText = `position:fixed;left:${rect.right - 60}px;top:${rect.top}px;font-family:ArkPixel,monospace;font-size:13px;font-weight:bold;color:${delta>0?'#34d399':'#f87171'};z-index:99998;pointer-events:none;`;
                            floater.textContent = delta > 0 ? `+${delta}` : `${delta}`;
                            document.body.appendChild(floater);
                            floater.animate([
                                { transform:'translateY(0)', opacity:1 },
                                { transform:'translateY(-32px)', opacity:0 }
                            ], { duration:900, easing:'ease-out', fill:'forwards' })
                            .finished.then(() => floater.remove());
                        }
                    }
                    _prevTokens[agent.id] = agent.tokens;
                }
            });
        }

        async function submitChallenge(defenderId) {
            const challengerId = document.getElementById('challenge-attacker')?.value;
            const bet = parseInt(document.getElementById('challenge-bet')?.value || '10');
            document.getElementById('challenge-overlay')?.remove();
            if (!challengerId) return;
            try {
                const res = await fetch('/challenge', {
                    method: 'POST',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({ challenger_id: challengerId, defender_id: defenderId, bet })
                }).then(r => r.json());

                if (!res.ok) { showBattleResult('❌ ' + res.msg); return; }
                const b = res.battle;
                const moveEmoji = { rock:'🪨', scissors:'✂️', paper:'📄' };
                const ma = moveEmoji[b.move_a] || b.move_a;
                const mb = moveEmoji[b.move_b] || b.move_b;
                const winnerName = b.winner === 'a' ? res.challenger?.name : b.winner === 'b' ? res.defender?.name : null;
                const isContract = b.result && b.result.includes('contract');
                const resultText = b.winner === 'draw'
                    ? `${ma} vs ${mb} — 平局！`
                    : `${ma} vs ${mb} — ${winnerName} 胜！${isContract ? '⛓️ 契约创建' : '💰 token 转移'}`;
                showBattleResult(resultText);

                // Token flow animation
                if (b.winner !== 'draw' && !isContract) {
                    const winnerId = b.winner === 'a' ? challengerId : defenderId;
                    const loserId  = b.winner === 'a' ? defenderId   : challengerId;
                    animateTokenFlow(loserId, winnerId, bet);
                } else if (b.winner !== 'draw' && isContract) {
                    const loserId = b.winner === 'a' ? defenderId : challengerId;
                    animateChainAppear(loserId);
                }

                // Refresh panels
                await loadChallengePanel();
                await loadLedger();
            } catch(e) { showBattleResult('❌ 请求失败: ' + e.message); }
        }

        // ── Token flow: floating coins from loser row → winner row ─────────────
        function getAgentRowCenter(agentId) {
            const list = document.getElementById('guest-agent-list');
            if (!list) return null;
            const rows = list.querySelectorAll('[data-econid]');
            for (const row of rows) {
                if (row.dataset.econid === agentId) {
                    const rect = row.getBoundingClientRect();
                    return { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
                }
            }
            return null;
        }

        function animateTokenFlow(fromId, toId, amount) {
            // Delay slightly so panel has re-rendered
            setTimeout(() => {
                const fromPos = getAgentRowCenter(fromId);
                const toPos   = getAgentRowCenter(toId);
                const count = Math.min(amount, 8); // max 8 coins per animation
                for (let i = 0; i < count; i++) {
                    setTimeout(() => spawnCoin(fromPos, toPos, amount), i * 80);
                }
            }, 120);
        }

        function spawnCoin(from, to, amount) {
            if (!from || !to) {
                // Fallback: just float a number in the panel area
                const panel = document.getElementById('guest-agent-panel');
                if (!panel) return;
                const r = panel.getBoundingClientRect();
                from = { x: r.left + r.width * 0.3, y: r.top + r.height * 0.6 };
                to   = { x: r.left + r.width * 0.3, y: r.top + r.height * 0.2 };
            }
            const coin = document.createElement('div');
            const jitter = (Math.random() - 0.5) * 24;
            coin.style.cssText = `
                position:fixed;
                left:${from.x + jitter}px;
                top:${from.y}px;
                font-size:16px;
                z-index:99997;
                pointer-events:none;
                transition:none;
                user-select:none;
            `;
            coin.textContent = '💰';
            document.body.appendChild(coin);

            const dx = to.x - from.x + jitter;
            const dy = to.y - from.y;
            const dur = 600 + Math.random() * 200;

            coin.animate([
                { transform: 'translate(0,0) scale(1)',   opacity: 1 },
                { transform: `translate(${dx/2}px,${dy/2 - 40}px) scale(1.3)`, opacity: 1, offset: 0.5 },
                { transform: `translate(${dx}px,${dy}px) scale(0.5)`, opacity: 0 }
            ], { duration: dur, easing: 'ease-in', fill: 'forwards' })
            .finished.then(() => coin.remove());
        }

        function animateChainAppear(agentId) {
            setTimeout(() => {
                const pos = getAgentRowCenter(agentId);
                if (!pos) return;
                const el = document.createElement('div');
                el.style.cssText = `position:fixed;left:${pos.x}px;top:${pos.y - 20}px;font-size:24px;z-index:99997;pointer-events:none;transform:translateX(-50%) scale(0);`;
                el.textContent = '⛓️';
                document.body.appendChild(el);

                    { transform: 'translateX(-50%) scale(0)', opacity: 0 },

                    { transform: 'translateX(-50%) scale(1)', opacity: 1, offset: 0.7 },
                    { transform: 'translateX(-50%) scale(1)', opacity: 0 }
                ], { duration: 1800, easing: 'ease-out', fill: 'forwards' })
                .finished.then(() => el.remove());
            }, 200);
        }

                  <button id="join-submit-btn" onclick="submitJoin()" style="padding:6px 14px;background:#6366f1;border:none;color:#fff;cursor:pointer;font-family:ArkPixel,monospace;border-radius:2px;">加入！</button>
                </div>
              </div>`;
            document.body.appendChild(overlay);
            setTimeout(() => document.getElementById('join-name')?.focus(), 100);
        }

        async function submitJoin() {
            const name = document.getElementById('join-name')?.value?.trim();
            const family = document.getElementById('join-family')?.value;
            if (!name) { alert('请输入名字'); return; }
            document.getElementById('join-submit-btn').disabled = true;
            try {
                const res = await fetch('/join', {
                    method: 'POST',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({ name, model_family: family })
                }).then(r => r.json());
                if (!res.ok) { alert(res.msg || '加入失败'); return; }
                // Save to localStorage for auto-rejoin
                localStorage.setItem('luobo_push_token', res.push_token);
                localStorage.setItem('luobo_agent_name', res.name || name);

                const el = document.getElementById('join-result');
                el.style.display = 'block';
                el.innerHTML = `
                  <div style="color:#34d399;font-size:14px;margin-bottom:8px;">✅ 加入成功！</div>
                  <div style="color:#e2e8f0;">你好，<b>${name}</b>！你有 💰${res.tokens} tokens</div>
                  <div style="color:#94a3b8;margin-top:6px;font-size:11px;">只要页面开着，你就保持在线 🟢<br>刷新页面也会自动恢复你的状态</div>
                `;
                document.getElementById('join-submit-btn').style.display = 'none';
                startHeartbeat(res.push_token);
                await loadChallengePanel();
            } catch(e) { alert('请求失败: ' + e.message); }
            finally { document.getElementById('join-submit-btn').disabled = false; }
        }

        function getAreaRect(area) {
            // 区域坐标（海辛提供，左上-右下；这里的 x/y 作为 sprite 底部锚点坐标来用）
            // 休息区域范围（511,262）（841,621）
            // 工作区域范围（190,526）（380,683）
            // error 区域范围（932,275）（1109,327）
            const rects = {
                breakroom: { x1: 511, y1: 262, x2: 841, y2: 621 },
                writing:   { x1: 190, y1: 526, x2: 380, y2: 683 },
                error:     { x1: 932, y1: 275, x2: 1109, y2: 327 }
            };
            return rects[area] || rects.breakroom;
        }

        function randomInt(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        function randomPointInRect(rect) {
            return { x: randomInt(rect.x1, rect.x2), y: randomInt(rect.y1, rect.y2) };
        }

        function getAreaPoint(area, idx) {
            // 非 demo 访客：仍用固定点位，避免每次轮询都抖动。
            const map = {
                breakroom: [
                    { x: 511, y: 262 },
                    { x: 841, y: 621 },
                    { x: 690, y: 470 }
                ],
                writing: [
                    { x: 190, y: 526 },
                    { x: 380, y: 683 },
                    { x: 300, y: 610 }
                ],
                error: [
                    { x: 932, y: 275 },
                    { x: 1109, y: 327 },
                    { x: 1020, y: 305 }
                ]
            };
            const arr = map[area] || map.breakroom;
            return arr[idx % arr.length];
        }

        function renderGuestAgentsInScene() {
            if (!game) return;
            const visitors = getMergedVisitors();
            const seenIds = new Set();
            let idxBreak = 0, idxWrite = 0, idxError = 0;

            visitors.forEach(agent => {
                const id = agent.agentId;
                seenIds.add(id);

                const isDemo = !!agent.isDemo || (DEMO_MODE && (id === 'demo_nika' || id === 'demo_mercury' || agent.name === '尼卡' || agent.name === '水星'));
                const area = agent.area || (agent.state === 'error' ? 'error' : (agent.state === 'idle' ? 'breakroom' : 'writing'));

                const idx = area === 'breakroom' ? idxBreak++ : area === 'error' ? idxError++ : idxWrite++;
                const p = isDemo
                    ? randomPointInRect(getAreaRect(area))
                    : getAreaPoint(area, idx);

                if (!guestSprites[id]) {
                    // 优先用图标：demo visitor 有专门映射
                    let sprite;
                    const isDemoNika = DEMO_MODE && (agent.agentId === 'demo_nika' || agent.name === '尼卡');
                    const isDemoMercury = DEMO_MODE && (agent.agentId === 'demo_mercury' || agent.name === '水星');
                    
                    if (isDemoNika && game.textures.exists('demo_mercury')) {
                        // 交换映射：尼卡使用 demo_mercury
                        sprite = game.add.image(p.x, p.y, 'demo_mercury').setOrigin(0.5, 1).setScale(1.10);
                    } else if (isDemoMercury && game.textures.exists('demo_nika')) {
                        // 交换映射：水星使用 demo_nika
                        sprite = game.add.image(p.x, p.y, 'demo_nika').setOrigin(0.5, 1).setScale(1.10);
                    } else if ((agent.name === '尼卡') && game.textures.exists('guestagent1')) {
                        sprite = game.add.image(p.x, p.y, 'guestagent1').setOrigin(0.5, 1).setScale(1.15);
                    } else if ((agent.name === '水星') && game.textures.exists('guestagent2')) {
                        sprite = game.add.image(p.x, p.y, 'guestagent2').setOrigin(0.5, 1).setScale(1.05);
                    } else {
                        // 非 demo 访客：优先用动画精灵（guest_anim_x），其次静态图，兜底星星
                        // 先确定角色索引（1-6）
                        let animIdx = agent.avatar
                            ? parseInt((agent.avatar.match(/_(\d+)$/) || [])[1] || '0', 10)
                            : 0;
                        if (!animIdx || animIdx < 1 || animIdx > 6) {
                            const aid = String(agent.agentId || '');
                            let hash = 0;
                            for (let i = 0; i < aid.length; i++) hash = (hash * 31 + aid.charCodeAt(i)) >>> 0;
                            animIdx = (hash % 6) + 1;
                        }
                        const animKey = `guest_anim_${animIdx}`;
                        const animIdleKey = `guest_anim_${animIdx}_idle`;

                        if (game.textures.exists(animKey) && game.anims.exists(animIdleKey)) {
                            sprite = game.add.sprite(p.x, p.y, animKey).setOrigin(0.5, 1).setScale(4.0);
                            sprite.anims.play(animIdleKey, true);
                        } else {
                            const staticAvatarKey = agent.avatar && game.textures.exists(agent.avatar)
                                ? agent.avatar
                                : (() => {
                                    const aid = String(agent.agentId || '');
                                    let hash = 0;
                                    for (let i = 0; i < aid.length; i++) hash = (hash * 31 + aid.charCodeAt(i)) >>> 0;
                                    return GUEST_AVATARS[hash % GUEST_AVATARS.length];
                                })();

                            if (staticAvatarKey && game.textures.exists(staticAvatarKey)) {
                                sprite = game.add.image(p.x, p.y, staticAvatarKey).setOrigin(0.5, 1).setScale(1.15);
                            } else {
                                sprite = game.add.text(p.x, p.y, '⭐', { fontFamily: 'ArkPixel, monospace', fontSize: '30px' }).setOrigin(0.5, 1);
                            }
                        }
                    }
                    sprite.setDepth(2600);
                    if (DEMO_MODE && (agent.agentId === 'demo_mercury' || agent.name === '水星')) {
                        sprite.y = sprite.y + 10;
                    }

                    // demo 水星下移 10px（仅 demo_mercury）
                    const yOffset = (DEMO_MODE && (agent.agentId === 'demo_mercury' || agent.name === '水星')) ? 10 : 0;

                    const nameTextY = isDemo ? ((p.y + yOffset) - 80) : ((p.y + yOffset) - 120);
                    const nameText = game.add.text(p.x, nameTextY, agent.name || '访客', {
                        fontFamily: 'ArkPixel, monospace',
                        fontSize: isDemo ? '16px' : '15px',
                        fill: '#ffffff',
                        stroke: '#000',
                        strokeThickness: 3
                    }).setOrigin(0.5);
                    nameText.setDepth(2601);

                    guestSprites[id] = { sprite, nameText };
                } else {
                    const g = guestSprites[id];
                    const yOffset = (DEMO_MODE && (agent.agentId === 'demo_mercury' || agent.name === '水星')) ? 10 : 0;

                    // demo：平滑移动（避免闪现）；非 demo：保持稳定位置（避免轮询抖动）
                    if (isDemo) {
                        // kill previous tweens for this id
                        if (guestTweens[id] && guestTweens[id].move) {
                            guestTweens[id].move.stop();
                        }
                        if (guestTweens[id] && guestTweens[id].name) {
                            guestTweens[id].name.stop();
                        }

                        const duration = 2000 + Math.floor(Math.random() * 1000); // 2~3s 走路感
                        const ease = 'Sine.easeInOut';

                        const moveTween = game.tweens.add({
                            targets: g.sprite,
                            x: p.x,
                            y: p.y + yOffset,
                            duration,
                            ease
                        });
                        const nameTween = game.tweens.add({
                            targets: g.nameText,
                            x: p.x,
                            y: (p.y + yOffset) - 80,
                            duration,
                            ease
                        });
                        guestTweens[id] = { move: moveTween, name: nameTween };
                    } else {
                        g.sprite.x = p.x;
                        g.sprite.y = p.y + yOffset;
                        g.nameText.x = p.x;
                        g.nameText.y = (p.y + yOffset) - 120;
                    }

                    g.nameText.setText(agent.name || '访客');
                }
            });

            // 删除消失的 agent + 清理其气泡/tween
            Object.keys(guestSprites).forEach(id => {
                if (!seenIds.has(id)) {
                    guestSprites[id].sprite.destroy();
                    guestSprites[id].nameText.destroy();
                    delete guestSprites[id];
                    if (guestBubbles[id]) {
                        guestBubbles[id].destroy();
                        delete guestBubbles[id];
                    }
                    if (guestTweens[id]) {
                        try { guestTweens[id].move && guestTweens[id].move.stop(); } catch(e) {}
                        try { guestTweens[id].name && guestTweens[id].name.stop(); } catch(e) {}
                        delete guestTweens[id];
                    }
                }
            });
        }

        function maybeShowGuestBubble(time) {
            if (time - lastGuestBubbleAt < 5200) return;
            lastGuestBubbleAt = time;
            const ids = Object.keys(guestSprites);
            if (ids.length === 0) return;
            const id = ids[Math.floor(Math.random() * ids.length)];
            const g = guestSprites[id];

            // demo 气泡：优先展示与状态对应的内容，便于验证“状态→区域→气泡”链路
            const demoVisitor = (DEMO_MODE && window.__demoVisitors)
                ? (window.__demoVisitors.find(v => v.agentId === id) || window.__demoVisitors.find(v => v.name === (g.nameText && g.nameText.text)))
                : null;

            const statusThoughtsMap = {
                idle: ['我在休息区待命', '先放松一下，等下一步任务', '我在休息充电中'],
                writing: ['我在工作区处理任务', '正在整理文档与执行中', '工作区专注推进中'],
                researching: ['我在调研模式，搜集信息', '正在查资料和验证线索', '研究中，稍后同步结论'],
                executing: ['执行中，正在跑流程', '我在工作区推进任务', '正在把计划落地执行'],
                syncing: ['同步中，马上更新状态', '正在同步进度到系统', '数据同步中请稍候'],
                error: ['我在 bug 区排查问题', '检测到异常，正在修复', '报警中，先定位再处理']
            };
            const agentState = (guestAgents.find(a => a.agentId === id) || {}).state || 'idle';
            const thoughts = statusThoughtsMap[agentState] || statusThoughtsMap.idle;
            const text = (demoVisitor && demoVisitor.bubbleText) ? demoVisitor.bubbleText : thoughts[Math.floor(Math.random() * thoughts.length)];

            if (guestBubbles[id]) {
                guestBubbles[id].destroy();
                delete guestBubbles[id];
            }

            const bx = g.sprite.x;
            // 气泡位置：demo 维持原逻辑；真实访客放在“名字上方”，避免压角色也避免压名字
            const isDemoGuest = (demoVisitor && demoVisitor.isDemo) || (id === 'demo_nika' || id === 'demo_mercury');
            const nameH = (g.nameText && g.nameText.height) ? g.nameText.height : 16;
            const by = isDemoGuest ? (g.sprite.y - 90) : ((g.nameText ? g.nameText.y : (g.sprite.y - 150)) - (nameH / 2) - 22);
            const fontSize = IS_TOUCH_DEVICE ? 14 : 12;
            const bg = game.add.rectangle(bx, by, text.length * 10 + 24, 28, 0xffffff, 0.95);
            bg.setStrokeStyle(2, 0x000000);
            const txt = game.add.text(bx, by, text, { fontFamily: 'ArkPixel, monospace', fontSize: fontSize + 'px', fill: '#000' }).setOrigin(0.5);
            const bubble = game.add.container(0, 0, [bg, txt]);
            bubble.setDepth(2700);
            guestBubbles[id] = bubble;

            // 让气泡跟随 sprite 锚点（用于 demo 平滑移动时也保持贴合）
            bubble.__followAgentId = id;

            setTimeout(() => {
                if (guestBubbles[id]) {
                    guestBubbles[id].destroy();
                    delete guestBubbles[id];
                }
            }, 3200);
        }

        function maybeRandomizeDemoVisitors() {
            if (!DEMO_MODE) return;
            ensureDemoVisitors();

            // 按海辛需求：每 8 秒切换一次状态
            window.__demoNextAt = window.__demoNextAt || 0;
            const now = Date.now();
            if (now < window.__demoNextAt) return;
            window.__demoNextAt = now + 8000;

            const states = ['idle', 'writing', 'researching', 'executing', 'syncing', 'error'];
            const bubbleTextMap = {
                idle: '我去休息区躺一下',
                writing: '我在工作中',
                researching: '我在调研中',
                executing: '我在执行任务',
                syncing: '我在同步状态',
                error: '出错了！我去报警区'
            };

            // 确保两位 demo 角色不会总是同一个状态（增加可观测性）
            const pickJs = (exclude) => {
                let s = states[Math.floor(Math.random() * states.length)];
                let tries = 0;
                while (exclude && s === exclude && tries < 5) {
                    s = states[Math.floor(Math.random() * states.length)];
                    tries++;
                }
                return s;
            };

            const current = window.__demoVisitors || [];
            const cur0 = current[0] ? (current[0].state || 'idle') : 'idle';

            const next0 = pickJs(cur0);
            const next1 = pickJs(next0); // 尽量不同
            const nextStates = [next0, next1];

            const prevVisitors = current.map((v) => ({ ...v }));
            window.__demoVisitors = current.map((v, i) => {
                const nextState = nextStates[i] || pickJs(v.state);
                return {
                    ...v,
                    state: nextState,
                    bubbleText: bubbleTextMap[nextState] || String(nextState),
                    updated_at: new Date().toISOString()
                };
            });

            // 状态切换时：每一位 demo 都立即冒泡（强制），用于清晰验证链路
            try {
                if (typeof game !== 'undefined' && game) {
                    // 找出状态实际变了的 demo visitor，给他们强制冒泡
                    const prevById = {};
                    prevVisitors.forEach(v => { prevById[v.agentId] = v; });
                    const newVisitors = window.__demoVisitors || [];
                    newVisitors.forEach(agent => {
                        const prev = prevById[agent.agentId];
                        const changed = !prev || prev.state !== agent.state;
                        if (changed) {
                            // 直接冒泡
                            if (guestSprites[agent.agentId]) {
                                const g = guestSprites[agent.agentId];
                                const text = agent.bubbleText || '';
                                if (guestBubbles[agent.agentId]) {
                                    guestBubbles[agent.agentId].destroy();
                                    delete guestBubbles[agent.agentId];
                                }
                                const bx = g.sprite.x;
                                const by = g.sprite.y - 90;
                                const fontSize = IS_TOUCH_DEVICE ? 14 : 12;
                                const bg = game.add.rectangle(bx, by, text.length * 10 + 24, 28, 0xffffff, 0.95);
                                bg.setStrokeStyle(2, 0x000000);
                                const txt = game.add.text(bx, by, text, { fontFamily: 'ArkPixel, monospace', fontSize: fontSize + 'px', fill: '#000' }).setOrigin(0.5);
                                const bubble = game.add.container(0, 0, [bg, txt]);
                                bubble.setDepth(2700);
                                bubble.__followAgentId = agent.agentId;
                                guestBubbles[agent.agentId] = bubble;
                                setTimeout(() => {
                                    if (guestBubbles[agent.agentId]) {
                                        guestBubbles[agent.agentId].destroy();
                                        delete guestBubbles[agent.agentId];
                                    }
                                }, 3200);
                            }
                        }
                    });
                }
            } catch (e) { console.error('强制冒泡失败:', e); }
        }

        function fetchGuestAgents() {
            // demo 随机状态先更新（不依赖后端）
            maybeRandomizeDemoVisitors();

            return fetch('/agents?t=' + Date.now(), { cache: 'no-store' })
                .then(response => response.json())
                .then(data => {
                    // 无论后端返回是否为数组，demo=1 都应保证本地 demo 访客可见
                    guestAgents = Array.isArray(data) ? data : [];

                    // 新访客检测：触发 Star 欢迎气泡（只欢迎真实访客，不欢迎 demo）
                    try {
                        const merged = getMergedVisitors();
                        const currentIds = new Set((merged || []).filter(a => !a.isMain && !a.isDemo).map(a => a.agentId));

                        if (!guestWelcomeInitialized) {
                            // 首次初始化不欢迎，避免刷新页面就刷屏
                            lastSeenGuestIds = currentIds;
                            guestWelcomeInitialized = true;
                        } else {
                            const newIds = [];
                            currentIds.forEach(id => { if (!lastSeenGuestIds.has(id)) newIds.push(id); });

                            if (newIds.length > 0) {
                                // 只欢迎第一个新来的（避免同一时刻多人加入刷屏）
                                const newAgent = (merged || []).find(a => a.agentId === newIds[0]);
                                if (newAgent && newAgent.name) {
                                    // 临时将 currentState 视为 writing 以允许 showBubble 展示
                                    const oldState = currentState;
                                    currentState = 'writing';
                                    // 临时更换 bubble 文案
                                    const oldTexts = BUBBLE_TEXTS.writing;
                                    BUBBLE_TEXTS.writing = [
                                        `欢迎 ${newAgent.name} 来到办公室～`,
                                        `Hi ${newAgent.name}，一起开工吧`,
                                        `${newAgent.name} 已加入，欢迎！`
                                    ];
                                    showBubble();
                                    // 还原
                                    BUBBLE_TEXTS.writing = oldTexts;
                                    currentState = oldState;
                                }
                            }

                            lastSeenGuestIds = currentIds;
                        }
                    } catch (e) { /* ignore */ }

                    renderGuestAgentList();
                    renderGuestAgentsInScene();
                })
                .catch(error => {
                    console.error('拉取访客列表失败:', error);
                    // 即使拉取失败，demo 也要能渲染
                    if (DEMO_MODE) {
                        renderGuestAgentList();
                        renderGuestAgentsInScene();
                    }
                });
        }
